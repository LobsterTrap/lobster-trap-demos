# Kind cluster config for the Lobster Trap demo
# Exposes ports for Vault UI
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # Vault UI (optional, handy for demo visibility)
      - containerPort: 30200
        hostPort: 8200
        protocol: TCP
